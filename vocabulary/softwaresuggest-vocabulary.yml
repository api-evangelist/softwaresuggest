vocabulary:
  name: SoftwareSuggest Vocabulary
  description: >-
    Domain vocabulary for the SoftwareSuggest business software discovery platform,
    covering product categorization, review methodology, vendor programs, and
    evaluation frameworks used throughout the platform.
  version: '1.0'
  created: '2026-05-02'
  modified: '2026-05-02'

platform-concepts:
  - term: Software Category
    definition: >-
      A classification grouping of software products sharing common functionality,
      use cases, or target users. SoftwareSuggest maintains over 800 categories
      including CRM, HRMS, Accounting, Project Management, and ERP.
    examples:
      - CRM Software
      - HR Management Software
      - Accounting Software
      - Project Management Software
      - Marketing Automation
    related:
      - Product Listing
      - Comparison

  - term: Product Listing
    definition: >-
      A vendor-maintained or editorially created page describing a specific
      software product on the SoftwareSuggest platform, including features,
      pricing, deployment options, and user reviews.
    related:
      - Software Category
      - Vendor
      - User Review

  - term: User Review
    definition: >-
      A verified evaluation submitted by a confirmed user of a listed software
      product. SoftwareSuggest hosts over 40,000 verified reviews across its
      catalog, each including ratings for ease of use, features, support, and
      value for money.
    aliases:
      - Verified Review
    related:
      - Product Listing
      - Rating
      - Review Criteria

  - term: Comparison
    definition: >-
      A side-by-side evaluation of two or more software products across shared
      feature dimensions, pricing, and user ratings, generated by the platform
      to assist buyers in making informed decisions.
    related:
      - Product Listing
      - Software Category
      - Evaluation

  - term: Lead
    definition: >-
      A verified contact submission from a software buyer expressing interest
      in a vendor's product, generated through the SoftwareSuggest platform
      and delivered to the vendor via the portal. Lead quality is validated
      before delivery.
    related:
      - Vendor
      - CPL
      - MQL

  - term: MQL
    definition: >-
      A Marketing Qualified Lead: a lead that has been scored and determined
      to meet a defined criteria threshold indicating genuine purchase intent,
      offered as a premium service to vendors through the SoftwareSuggest
      vendor portal.
    aliases:
      - Marketing Qualified Lead
    related:
      - Lead
      - Vendor
      - CPL

vendor-programs:
  - term: Free Listing
    definition: >-
      A basic product listing on SoftwareSuggest that vendors can create at no
      cost, providing a presence in the catalog with standard product information,
      features, and review collection capabilities.
    related:
      - Product Listing
      - Vendor
      - Premium Listing

  - term: Premium Listing
    definition: >-
      A paid enhanced listing with increased visibility, priority placement in
      search results, highlighted badges, and access to advanced analytics and
      lead reporting tools.
    related:
      - Free Listing
      - Vendor
      - Sponsored Placement

  - term: PPC Campaign
    definition: >-
      A pay-per-click advertising model available to vendors on SoftwareSuggest,
      placing their product prominently in search results and category pages
      with costs incurred per qualifying click or lead.
    aliases:
      - Pay-Per-Click
    related:
      - Lead
      - Vendor
      - Premium Listing

  - term: CPL
    definition: >-
      Cost per Lead: the pricing model used in the SoftwareSuggest affiliate and
      vendor programs where payment is based on the number of verified leads
      generated, rather than impressions or clicks.
    aliases:
      - Cost Per Lead
    related:
      - Lead
      - Affiliate Program
      - MQL

evaluation-criteria:
  - term: Ease of Use
    definition: >-
      A review dimension scoring how intuitive and user-friendly a software
      product is for its intended audience, considering onboarding experience,
      interface design, and learning curve.
    related:
      - User Review
      - Rating

  - term: Value for Money
    definition: >-
      A review dimension scoring how well a software product's price point
      aligns with the features, support, and overall value it delivers to the
      user organization.
    related:
      - User Review
      - Rating
      - Pricing

  - term: Customer Support
    definition: >-
      A review dimension scoring the quality and responsiveness of a vendor's
      technical support, documentation, onboarding assistance, and ongoing
      customer success activities.
    related:
      - User Review
      - Rating
      - Vendor

  - term: Deployment Type
    definition: >-
      A classification indicating how a software product is hosted and accessed,
      typically one of: Cloud/SaaS, On-Premise, or Hybrid. Used as a filter
      criterion on the SoftwareSuggest platform.
    values:
      - Cloud / SaaS
      - On-Premise
      - Hybrid
    related:
      - Product Listing
      - Software Category

  - term: Organization Size
    definition: >-
      A target market classification indicating the size of organizations a
      software product is designed to serve, typically segmented as Small Business,
      Mid-Market, and Enterprise.
    values:
      - Small Business
      - Mid-Market
      - Enterprise
    related:
      - Product Listing
      - Software Category
